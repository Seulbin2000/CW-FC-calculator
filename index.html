<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>청운 FC 정산</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:#102033;background:radial-gradient(circle at top left,#dce9ff 0%,transparent 28%),radial-gradient(circle at top right,#d7e6ff 0%,transparent 24%),linear-gradient(180deg,#f5f9ff 0%,#eef5ff 50%,#f8fbff 100%)}
.container{max-width:1380px;margin:0 auto;padding:16px}.hero{position:relative;overflow:hidden;border-radius:30px;padding:24px;background:linear-gradient(135deg,#0e4ed4 0%,#1d6cff 50%,#0b57de 100%);color:#fff;box-shadow:0 20px 50px rgba(12,65,170,.20);margin-bottom:18px}
.hero::before{content:"";position:absolute;width:260px;height:260px;right:-70px;bottom:-110px;border-radius:50%;background:rgba(255,255,255,.10)}.hero::after{content:"";position:absolute;width:170px;height:170px;left:-50px;top:-60px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-top{position:relative;z-index:1;display:flex;align-items:center;gap:18px;flex-wrap:wrap}.logo-box,.share-logo{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0}
.logo-box{width:118px;height:118px;flex-shrink:0;border-radius:28px}.share-logo{width:84px;height:84px;border-radius:22px;flex-shrink:0}.logo-box img,.share-logo img{width:100%;height:100%;object-fit:contain;object-position:center;display:block;transform:scale(.94)}
.hero h1{margin:0;font-size:32px;font-weight:950;letter-spacing:-.03em}.hero p{margin:8px 0 0;font-size:14px;line-height:1.6;color:rgba(255,255,255,.92);max-width:860px}
.layout{display:grid;grid-template-columns:1.08fr .92fr;gap:18px}.left,.right{display:grid;gap:18px;align-content:start}.card{background:rgba(255,255,255,.90);border:1px solid #e4ecf8;border-radius:26px;padding:18px;box-shadow:0 16px 40px rgba(16,24,40,.06);backdrop-filter:blur(8px)}
.title-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}h2{margin:0;font-size:22px;letter-spacing:-.02em}.muted{color:#66758a;font-size:13px;line-height:1.55}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);border:1px solid #e3ebf8;border-radius:20px;padding:14px}.stat-label{font-size:12px;color:#728199}.stat-value{margin-top:6px;font-size:24px;font-weight:950;letter-spacing:-.02em}
label{display:block;font-size:14px;font-weight:850;margin-bottom:8px}input[type="text"],select{width:100%;padding:13px 14px;border-radius:15px;border:1px solid #d9e2f4;font-size:16px;background:#fff;outline:none}input[type="range"]{width:100%}
.chip{display:inline-flex;align-items:center;justify-content:center;min-width:64px;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:850;background:#ecf3ff;color:#0f4fd6}.row-between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.controls,.tabs{display:flex;gap:8px;flex-wrap:wrap}button{border:none;border-radius:15px;padding:11px 14px;font-size:14px;font-weight:850;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,background .15s ease,color .15s ease}button:hover{transform:translateY(-1px)}.primary{background:linear-gradient(135deg,#0f4fd6 0%,#1c66ff 100%);color:#fff;box-shadow:0 8px 18px rgba(15,79,214,.18)}.secondary{background:#fff;color:#21324b;border:1px solid #d9e2f4}.secondary.active-control{background:linear-gradient(135deg,#0f4fd6 0%,#1c66ff 100%);color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(15,79,214,.16)}.tab{background:#f3f7ff;color:#29415f;border:1px solid #dbe5f5}.tab.active{background:linear-gradient(135deg,#0f4fd6 0%,#1a67ff 100%);color:#fff;border-color:transparent}
.feature-select{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}.toggle-card{border:1px solid #dce6f4;border-radius:18px;padding:12px 14px;background:#f7faff;color:#29415f;font-weight:800;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:8px}.toggle-card.active{background:linear-gradient(135deg,#0f4fd6 0%,#1a67ff 100%);color:#fff;border-color:transparent;box-shadow:0 10px 20px rgba(15,79,214,.16)}.toggle-card .dot{width:10px;height:10px;border-radius:50%;background:#b8c9ea}.toggle-card.active .dot{background:#9effc6;box-shadow:0 0 0 4px rgba(255,255,255,.16)}
.money-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}.amount-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.amount-card{border:1px solid #e3ebf8;border-radius:18px;padding:12px;background:#fbfdff}.editable-label{display:flex;flex-direction:column;gap:6px}.editable-label input[type="text"]{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #d9e2f4;font-size:13px;background:#fff;outline:none}.editable-label-title{font-size:12px;color:#728199;font-weight:800}
.guest-add{margin-top:16px;border:1px dashed #cfe0fb;border-radius:20px;padding:14px;background:#f8fbff}.guest-add-grid{display:grid;grid-template-columns:1.1fr .9fr .9fr auto;gap:10px;align-items:end}
.people-list{max-height:780px;overflow:auto;padding-right:4px}.person-card{border-radius:24px;padding:15px;margin-bottom:12px;border:1px solid #e5edf8;background:linear-gradient(180deg,#fff 0%,#fafdff 100%);box-shadow:0 6px 14px rgba(16,24,40,.03);transition:.16s ease}.person-card.attending{border-color:#c5d7fb}.person-card.absent{opacity:.56;background:#fbfcfe}.person-card.coach{position:relative;overflow:hidden;background:radial-gradient(circle at top right,rgba(255,255,255,.20),transparent 26%),radial-gradient(circle at bottom left,rgba(255,255,255,.10),transparent 28%),linear-gradient(135deg,#0943bd 0%,#1559ea 50%,#0c6bff 100%);color:#fff;border:1px solid rgba(255,255,255,.20);box-shadow:0 18px 34px rgba(12,82,223,.24)}.person-card.coach::before{content:"";position:absolute;inset:auto -16px -20px auto;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.10)}
.person-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;cursor:pointer;position:relative;z-index:1}.name-line{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:19px;font-weight:950;letter-spacing:-.02em}.meta{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:850}.role-worker{background:#ecfdf5;color:#0f766e}.role-student{background:#fff7ed;color:#b45309}.role-coach{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.18)}.role-guest{background:#f3e8ff;color:#7c3aed}.status-on{background:#eaf7ef;color:#0d7a3f}.status-off{background:#f2f4f7;color:#667085}.person-card.coach .status-on{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.18)}.person-card.coach .muted{color:rgba(255,255,255,.86)}
.captain-band{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:linear-gradient(135deg,#ffd54f 0%,#ffeb91 100%);color:#0b3ea8;font-weight:950;font-size:15px;box-shadow:0 0 0 3px rgba(255,255,255,.16),0 8px 16px rgba(0,0,0,.12)}
.remove-btn{background:#fff1f2;color:#be123c;border:1px solid #fecdd3;padding:8px 12px;border-radius:12px}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;position:relative;z-index:1}.mode-btn{background:#f4f7fc;border:1px solid #dce6f4;color:#364b67;padding:12px 10px;text-align:center}.mode-btn.active.alcohol{background:linear-gradient(135deg,#0f4fd6 0%,#1a67ff 100%);color:#fff;border-color:transparent;box-shadow:0 8px 16px rgba(15,79,214,.18)}.mode-btn.active.beverage{background:linear-gradient(135deg,#0d9d54 0%,#26b869 100%);color:#fff;border-color:transparent;box-shadow:0 8px 16px rgba(13,157,84,.18)}.person-card.coach .mode-btn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#fff}.person-card.coach .mode-btn.active.alcohol{background:#fff;color:#0f4fd6;box-shadow:0 10px 20px rgba(255,255,255,.20)}.person-card.coach .mode-btn.active.beverage{background:#9effc6;color:#0a5f34}
.share-card{background:linear-gradient(135deg,#0f4fd6 0%,#154ec3 45%,#0d60e2 100%);border-radius:28px;padding:18px;color:#fff;box-shadow:0 22px 46px rgba(15,79,214,.20)}.share-card h2{margin:0 0 8px;font-size:24px}.share-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.share-meta-box{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:12px}.share-meta-label{font-size:12px;opacity:.86}.share-meta-value{margin-top:6px;font-size:22px;font-weight:950}
.share-preview{margin-top:16px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:16px}.preview-toolbar{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
#shareImageCard{border-radius:24px;overflow:hidden;background:linear-gradient(135deg,#0c43b8 0%,#1c65ff 50%,#0d58dd 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}.share-image-inner{padding:18px;position:relative;overflow:hidden}.share-image-inner::before{content:"";position:absolute;width:220px;height:220px;right:-70px;top:-60px;border-radius:50%;background:rgba(255,255,255,.10)}.share-image-inner::after{content:"";position:absolute;width:160px;height:160px;left:-40px;bottom:-40px;border-radius:50%;background:rgba(255,255,255,.08)}
.share-header{position:relative;z-index:1;display:flex;align-items:center;gap:12px;margin-bottom:16px}.share-title{font-size:26px;font-weight:950;letter-spacing:-.03em}.share-subtitle{font-size:13px;color:rgba(255,255,255,.86);margin-top:4px}.share-summary-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.share-summary-box{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:12px}.share-summary-box .label{font-size:12px;color:rgba(255,255,255,.82)}.share-summary-box .value{margin-top:6px;font-size:22px;font-weight:950}
.share-list{position:relative;z-index:1;background:rgba(255,255,255,.95);border-radius:22px;padding:12px;color:#112033}.share-list-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}.share-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px;border-radius:14px;background:#f7faff}.share-row:nth-child(4n+2),.share-row:nth-child(4n+3){background:#eef4ff}.share-row-name{font-size:14px;font-weight:900}.share-row-sub{margin-top:3px;font-size:11px;color:#66758a;line-height:1.45}.share-row-amount{font-size:16px;font-weight:950;color:#0f4fd6;white-space:nowrap}.share-footer{position:relative;z-index:1;margin-top:12px;font-size:12px;color:rgba(255,255,255,.84);text-align:right}
.result-list{display:grid;gap:10px;max-height:500px;overflow:auto;padding-right:4px}.result-item{border-radius:20px;border:1px solid #dfe8f7;padding:14px;background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.result-name{font-size:17px;font-weight:950}.result-sub{margin-top:4px;font-size:12px;color:#6e7b8f;line-height:1.55}.result-amount{font-size:22px;font-weight:950;color:#0f4fd6}
@media (max-width:1180px){.layout{grid-template-columns:1fr}.share-list-grid{grid-template-columns:1fr}.feature-select{grid-template-columns:1fr 1fr}}
@media (max-width:860px){.grid2,.grid4,.money-grid,.share-meta,.share-summary-grid,.feature-select,.amount-row,.guest-add-grid{grid-template-columns:1fr}.logo-box{width:94px;height:94px}.hero h1{font-size:27px}.container{padding:12px}.card,.hero,.share-card{padding:16px}}

.participation-wrap{margin-top:10px;display:grid;gap:8px;position:relative;z-index:1}
.participation-title{font-size:12px;font-weight:800;color:#6e7b8f}
.person-card.coach .participation-title{color:rgba(255,255,255,.86)}
.participation-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.participation-btn{background:#f4f7fc;border:1px solid #dce6f4;color:#364b67;padding:9px 8px;text-align:center;border-radius:12px;font-size:12px;font-weight:800}
.participation-btn.active{background:linear-gradient(135deg,#0f4fd6 0%,#1a67ff 100%);color:#fff;border-color:transparent;box-shadow:0 8px 16px rgba(15,79,214,.18)}
.person-card.coach .participation-btn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#fff}
.person-card.coach .participation-btn.active{background:#fff;color:#0f4fd6}
.extra-settings{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mode-toggle{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.extra-settings{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mode-toggle{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.small-note{margin-top:8px;color:#66758a;font-size:12px;line-height:1.5}
.ratio-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.ratio-box{border:1px solid #dfe8f7;border-radius:16px;padding:12px;background:#fbfdff}
.ratio-value{margin-top:6px;font-size:18px;font-weight:900;color:#0f4fd6}

</style>

function fmtNum(v) {
  return Number(v).toLocaleString("en-SG", {
    minimumFractionDigits: 0,
    maximumFractionDigits: 2
  });
}
function fmtCur(v) { return "S$" + fmtNum(Number(v || 0)); }
function parseMoney(value) {
  const cleaned = String(value || "")
    .replace(/[^0-9.]/g, "")
    .replace(/(\..*)\./g, "$1");
  return Number(cleaned || 0);
}
function sanitizeMoneyInput(value) {
  let cleaned = String(value || "").replace(/[^0-9.]/g, "");
  const firstDot = cleaned.indexOf(".");
  if (firstDot !== -1) {
    cleaned = cleaned.slice(0, firstDot + 1) + cleaned.slice(firstDot + 1).replace(/\./g, "");
  }
  return cleaned;
}

function getFieldLabel(key) { return (customLabels[key] || "").trim() || getFieldLabel(key); }
function setCustomLabel(key, value) {
  customLabels[key] = value || "";
  const finalLabel = getFieldLabel(key);
  document.querySelectorAll(`[data-field-text="${key}"]`).forEach(el => {
    el.textContent = finalLabel;
  });
  const toggleBtn = document.getElementById(`toggle-${key}`);
  if (toggleBtn) {
    const firstSpan = toggleBtn.querySelector("span");
    if (firstSpan) firstSpan.textContent = finalLabel;
  }
}
function bindLabelInput(inputEl, key) {
  let isComposing = false;
  inputEl.addEventListener("compositionstart", () => { isComposing = true; });
  inputEl.addEventListener("compositionend", (e) => {
    isComposing = false;
    setCustomLabel(key, e.target.value);
  });
  inputEl.addEventListener("input", (e) => {
    if (isComposing) return;
    setCustomLabel(key, e.target.value);
  });
  inputEl.addEventListener("blur", (e) => {
    setCustomLabel(key, e.target.value);
  });
}

function handleSplitInput(key, input) {

    if (key === "r1" && visibleFields.length === 1) return;
    visibleFields = visibleFields.filter(k => k !== key);

  const order = ["r1","r2","r3","t1","t2","t3"];
  visibleFields.sort((a,b) => order.indexOf(a) - order.indexOf(b));
  render();

function getAlcoholWeight(person, discountPct) {
  return person.type === "student" ? 1 - discountPct / 100 : 1;
}
function getBeverageFee(person) {
  const workerFee = Number(document.getElementById("beverageFee").value);
  const studentFee = Number(document.getElementById("studentBeverageFee")?.value || 6);
  return person.type === "student" ? studentFee : workerFee;
}
function getActiveForField(key) {
  return people.filter(p => p.attending && p.selected[key]);
}
function calcIntegratedRound(key, discountPct) {
  const participants = getActiveForField(key);
  const total = fieldAmt(key);
  const foodRatio = integratedFoodRatio / 100;
  const alcoholRatio = 1 - foodRatio;
  const foodTotal = total * foodRatio;
  const alcoholTotal = total * alcoholRatio;

  const out = {};
  participants.forEach(p => out[p.name] = 0);

  // 음식: 참석자 전원 + 학생 할인 적용
  const totalFoodWeight = participants.reduce((s, p) => {
    return s + (p.type === "student" ? getAlcoholWeight(p, discountPct) : 1);
  }, 0);
  participants.forEach(p => {
    const foodWeight = p.type === "student" ? getAlcoholWeight(p, discountPct) : 1;
    out[p.name] += totalFoodWeight > 0 ? foodTotal * foodWeight / totalFoodWeight : 0;
  });

  // 술/음료: 음료 고정값 먼저, 남은 금액을 술 마신 사람끼리 가중치 분배
  const beverageTotal = participants.filter(p => p.mode === "beverage").reduce((s,p)=>s+getBeverageFee(p),0);
  const alcoholPool = Math.max(alcoholTotal - beverageTotal, 0);
  const alcoholPeople = participants.filter(p => p.mode === "alcohol");
  const totalAlcoholWeight = alcoholPeople.reduce((s,p)=>s+getAlcoholWeight(p, discountPct),0);

  participants.forEach(p => {
    if (p.mode === "beverage") out[p.name] += getBeverageFee(p);
    else out[p.name] += totalAlcoholWeight > 0 ? alcoholPool * getAlcoholWeight(p, discountPct) / totalAlcoholWeight : 0;
  });

  return out;
}
function calcSplitRound(roundKey, discountPct) {
  const participants = getActiveForField(roundKey);
  const foodTotal = splitAmt('food_'+roundKey);
  const alcoholTotal = splitAmt('alcohol_'+roundKey);
  const out = {};
  participants.forEach(p=>out[p.name]=0);

  // 음식은 참석자 균등 분배
  const foodPer = participants.length ? foodTotal / participants.length : 0;
  participants.forEach(p => out[p.name] += foodPer);

  // 술/음료 분배
  const beverageTotal = participants.filter(p => p.mode === "beverage").reduce((s,p)=>s+getBeverageFee(p),0);
  const alcoholPool = Math.max(alcoholTotal - beverageTotal, 0);
  const alcoholPeople = participants.filter(p => p.mode === "alcohol");
  const totalWeight = alcoholPeople.reduce((s,p)=>s+getAlcoholWeight(p, discountPct),0);
  participants.forEach(p=>{
    if (p.mode === "beverage") out[p.name] += getBeverageFee(p);
    else out[p.name] += totalWeight > 0 ? alcoholPool * getAlcoholWeight(p, discountPct) / totalWeight : 0;
  });
  return out;
}
function calcTaxi(key) {
  const participants = getActiveForField(key);
  const total = fieldAmt(key);
  const per = participants.length ? total / participants.length : 0;
  const out = {};
  participants.forEach(p => out[p.name] = per);
  return out;
}
function calculate() {
  const discount = Number(document.getElementById("studentDiscount").value);
  const rowsMap = new Map();
  people.filter(p=>p.attending).forEach(p => rowsMap.set(p.name, {...p, total:0, parts:{} }));

  visibleFields.forEach(key => {
    let dist = {};
    if (key.startsWith('t')) dist = calcTaxi(key);
    else if (splitMode) dist = calcSplitRound(key, discount);
    else dist = calcIntegratedRound(key, discount);

    rowsMap.forEach((row,name) => {
      const amt = dist[name] || 0;
      row.parts[key] = amt;
      row.total += amt;
    });
  });

  const rows = Array.from(rowsMap.values())
    .filter(r => Object.values(r.parts).some(v => v > 0) || r.attending)
    .sort((a,b)=>b.total-a.total || a.name.localeCompare(b.name,"ko"));

  const totalsByField = {};
  visibleFields.forEach(key => {
    if (key.startsWith('t')) totalsByField[key] = fieldAmt(key);
    else if (splitMode) totalsByField[key] = splitAmt('food_'+key) + splitAmt('alcohol_'+key);
    else totalsByField[key] = fieldAmt(key);
  });
  const totalAmount = Object.values(totalsByField).reduce((s,v)=>s+v,0);

  return {
    discount,
    studentBeverageFee: Number(document.getElementById("studentBeverageFee")?.value || 6),
    workerBeverageFee: Number(document.getElementById("beverageFee").value),
    active: people.filter(p=>p.attending),
    rows,
    totalsByField,
    totalAmount,
    alcoholCount: people.filter(p=>p.attending && p.mode==='alcohol').length,
    beverageCount: people.filter(p=>p.attending && p.mode==='beverage').length
  };
}

  if (person.role === "guest" && person.type === "student") return '<span class="meta role-guest">추가 인원 · 학생</span>';
  if (person.role === "guest" && person.type === "worker") return '<span class="meta role-guest">추가 인원 · 직장인</span>';
  if (person.type === "student") return '<span class="meta role-student">학생</span>';
  return '<span class="meta role-worker">직장인</span>';
}

  }).join("");
}
function renderSummaryFields(data) {
  const shareMeta = document.getElementById("shareMeta");
  const shareSummaryGrid = document.getElementById("shareSummaryGrid");
  shareMeta.innerHTML = visibleFields.map(key => `<div class="share-meta-box"><div class="share-meta-label">${getFieldLabel(key)}</div><div class="share-meta-value">${fmtCur(data.totalsByField[key] || 0)}</div></div>`).join("");
  shareSummaryGrid.innerHTML = visibleFields.map(key => `<div class="share-summary-box"><div class="label">${getFieldLabel(key)}</div><div class="value">${fmtCur(data.totalsByField[key] || 0)}</div></div>`).join("");
}
function renderShareList(data) {
  const list = document.getElementById("shareList");
  if (data.rows.length === 0) {
    list.innerHTML = '<div class="share-row"><div><div class="share-row-name">참석자가 없습니다</div><div class="share-row-sub">인원을 선택하면 여기 표시돼</div></div><div class="share-row-amount">-</div></div>';
    return;
  }
  list.innerHTML = data.rows.map(row => {
    const subHead = row.mode === "alcohol"
      ? (row.type === "student" ? "학생 · 술" : row.role === "coach" ? "감독 · 술" : row.type === "guest" ? "추가 인원 · 술" : "직장인 · 술")
      : (row.type === "student" ? "학생 · 음료" : row.type === "guest" ? "추가 인원 · 음료" : "직장인 · 음료");
    const details = visibleFields.map(key => `${getFieldLabel(key)} ${fmtCur(row.parts[key] || 0)}`).join(" / ");
    return `<div class="share-row"><div><div class="share-row-name">${row.name}</div><div class="share-row-sub">${subHead} · ${details}</div></div><div class="share-row-amount">${fmtCur(row.total)}</div></div>`;
  }).join("");
}
function render() {
  ensureExtraSettings();
  renderAmountFields();
  const data = calculate();
  document.getElementById("attendeeCount").textContent = `${data.active.length}명`;
  document.getElementById("alcoholCount").textContent = `${data.alcoholCount}명`;
  document.getElementById("beverageCount").textContent = `${data.beverageCount}명`;
  document.getElementById("grandTotal").textContent = fmtCur(data.totalAmount);
  document.getElementById("studentDiscountLabel").textContent = `${data.discount}%`;
  document.getElementById("beverageFeeLabel").textContent = fmtCur(data.workerBeverageFee);
  const studentFeeLabel = document.getElementById("studentBeverageFeeLabel");
  if (studentFeeLabel) studentFeeLabel.textContent = fmtCur(data.studentBeverageFee);
  const splitModeLabel = document.getElementById("splitModeLabel");
  if (splitModeLabel) splitModeLabel.textContent = splitMode ? "켜짐" : "꺼짐";
  const splitModeBtn = document.getElementById("splitModeBtn");
  if (splitModeBtn) splitModeBtn.classList.toggle("active-control", splitMode);
  const ratioInput = document.getElementById("integratedFoodRatio");
  const ratioLabel = document.getElementById("integratedRatioLabel");
  const foodRatioValue = document.getElementById("integratedFoodRatioValue");
  const alcoholRatioValue = document.getElementById("integratedAlcoholRatioValue");
  const ratioWrap = document.getElementById("integratedRatioWrap");
  if (ratioInput) ratioInput.value = String(integratedFoodRatio);
  if (ratioLabel) ratioLabel.textContent = `음식 ${integratedFoodRatio}% · 술 ${100 - integratedFoodRatio}%`;
  if (foodRatioValue) foodRatioValue.textContent = `${integratedFoodRatio}%`;
  if (alcoholRatioValue) alcoholRatioValue.textContent = `${100 - integratedFoodRatio}%`;
  if (ratioWrap) ratioWrap.style.display = splitMode ? "none" : "block";

  document.getElementById("allAttendBtn").classList.toggle("active-control", bulkState === "all");
  document.getElementById("allAbsentBtn").classList.toggle("active-control", bulkState === "none");
  renderSummaryFields(data);
  document.getElementById("shareSubtitle").textContent = `${visibleFields.map(k => fieldDefs[k].label).join(" / ")} · 총 ${data.active.length}명 · 전체 합계 ${fmtCur(data.totalAmount)}`;
  document.getElementById("shareFooter").textContent = `학생 술 할인 ${data.discount}% · 직장인 음료 ${fmtCur(data.workerBeverageFee)} · 학생 음료 ${fmtCur(data.studentBeverageFee)}`;
  renderPeople();
  renderShareList(data);

  const resultList = document.getElementById("resultList");
  if (data.rows.length === 0) {
    resultList.innerHTML = '<div class="result-item">아직 선택된 참석자가 없습니다.</div>';
    return;
  }
  resultList.innerHTML = data.rows.map(row => {
    const detail = visibleFields.map(key => `${getFieldLabel(key)} ${fmtCur(row.parts[key] || 0)}`).join(" · ");
    return `<div class="result-item"><div><div class="result-name">${row.name}</div><div class="result-sub">${detail}</div></div><div class="result-amount">${fmtCur(row.total)}</div></div>`;
  }).join("");
}
async function downloadShareImage() {
  const data = calculate();
  const rows = data.rows;
  const fieldLabels = visibleFields.map(key => getFieldLabel(key));
  const cols = 2;
  const perCol = Math.ceil(rows.length / cols);
  const rowHeight = 58;
  const listHeight = perCol * rowHeight + 24;
  const cardWidth = 1500;
  const cardHeight = 390 + listHeight;
  const escapeXml = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&apos;");
  const summaryBoxes = visibleFields.map((key, i) => {
    const x = 42 + i * (1416 / Math.max(visibleFields.length,1));
    const w = Math.max(220, (1416 / Math.max(visibleFields.length,1)) - 12);
    return `<rect x="${x}" y="150" width="${w}" height="96" rx="22" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.16)"/><text x="${x + 24}" y="180" fill="rgba(255,255,255,0.82)" font-size="16">${escapeXml(getFieldLabel(key))}</text><text x="${x + 24}" y="221" fill="#FFFFFF" font-size="32" font-weight="900">${escapeXml(fmtCur(data.totalsByField[key] || 0))}</text>`;
  }).join("");
  const rowSvgs = rows.map((row, idx) => {
    const col = Math.floor(idx / perCol);
    const rowIdx = idx % perCol;
    const x = 48 + col * 706;
    const y = 276 + rowIdx * rowHeight;
    const subHead = row.mode === "alcohol"
      ? (row.type === "student" ? "학생 · 술" : row.role === "coach" ? "감독 · 술" : row.type === "guest" ? "추가 인원 · 술" : "직장인 · 술")
      : (row.type === "student" ? "학생 · 음료" : row.type === "guest" ? "추가 인원 · 음료" : "직장인 · 음료");
    const details = visibleFields.map(key => `${getFieldLabel(key)} ${fmtCur(row.parts[key] || 0)}`).join(" / ");
    return `<rect x="${x}" y="${y}" width="676" height="46" rx="14" fill="${rowIdx % 2 === 0 ? '#F7FAFF' : '#EEF4FF'}" /><text x="${x + 18}" y="${y + 16}" fill="#13253B" font-size="18" font-weight="800">${escapeXml(row.name)}</text><text x="${x + 18}" y="${y + 32}" fill="#6A7B92" font-size="10">${escapeXml(subHead + " · " + details)}</text><text x="${x + 656}" y="${y + 25}" text-anchor="end" fill="#0F4FD6" font-size="20" font-weight="900">${escapeXml(fmtCur(row.total))}</text>`;
  }).join("");
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${cardWidth}" height="${cardHeight}" viewBox="0 0 ${cardWidth} ${cardHeight}"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0C43B8"/><stop offset="52%" stop-color="#1C65FF"/><stop offset="100%" stop-color="#0D58DD"/></linearGradient></defs><rect width="${cardWidth}" height="${cardHeight}" fill="url(#bg)"/><circle cx="1320" cy="90" r="170" fill="rgba(255,255,255,0.10)"/><circle cx="100" cy="${cardHeight - 10}" r="130" fill="rgba(255,255,255,0.08)"/><rect x="42" y="34" width="106" height="106" rx="28" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.18)"/><image href="${logoDataUrl}" x="50" y="42" width="90" height="90" preserveAspectRatio="xMidYMid meet"/><text x="168" y="78" fill="#FFFFFF" font-size="38" font-weight="900">청운 FC 정산</text><text x="168" y="108" fill="rgba(255,255,255,0.86)" font-size="16">${escapeXml(fieldLabels.join(" / "))} · 총 ${data.active.length}명 참석</text>${summaryBoxes}<rect x="42" y="264" width="1416" height="${cardHeight - 320}" rx="24" fill="rgba(255,255,255,0.95)"/>${rowSvgs}<text x="1448" y="${cardHeight - 18}" text-anchor="end" fill="rgba(255,255,255,0.86)" font-size="14">Chungwoon FC</text></svg>`;
  const svgBlob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = cardWidth; canvas.height = cardHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    canvas.toBlob((blob) => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "chungwoon-fc-settlement.png";
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }, "image/png");
  };
  img.onerror = () => { URL.revokeObjectURL(url); alert("이미지 저장에 실패했어. 이 경우 공유용 카드를 그대로 스크린샷 찍어줘."); };
  img.src = url;
}
render();
</script>
